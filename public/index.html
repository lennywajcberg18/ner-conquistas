<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ner Israel — Programa de Conquistas</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { height: 100%; width: 100%; }
      body { background: #0B1623; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #F0F4FA; }
      button { transition: transform 0.15s, filter 0.15s, opacity 0.15s; }
      button:hover:not(:disabled) { filter: brightness(1.15); transform: translateY(-1px); }
      button:active:not(:disabled) { transform: translateY(0); }
      [data-card] { transition: border-color 0.2s, transform 0.2s; }
      [data-card]:hover { border-color: #C9A84C66 !important; transform: translateY(-2px); }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
